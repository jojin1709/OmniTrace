<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniTrace Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { background: #1f2937; border-radius: 0.75rem; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); border: 1px solid #374151; }
        .section-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; color: #60a5fa; display: flex; align-items: center; gap: 0.5rem; }
        .profile-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #374151; }
        .profile-row:last-child { border-bottom: none; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
        .badge-success { background: #065f46; color: #6ee7b7; }
        .badge-warning { background: #92400e; color: #fcd34d; }
        .badge-danger { background: #991b1b; color: #fca5a5; }
        .badge-info { background: #1e40af; color: #93c5fd; }
        .badge-gray { background: #374151; color: #d1d5db; }
        .stat-card { background: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%); border-radius: 0.5rem; padding: 1rem; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #60a5fa; }
        .stat-label { font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; }
        .graph-container { background: #111827; border-radius: 0.5rem; padding: 1rem; }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { color: #93c5fd; text-decoration: underline; }
        .loading { display: none; text-align: center; padding: 2rem; }
        .spinner { border: 4px solid #374151; border-top: 4px solid #60a5fa; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .drop-zone { border: 2px dashed #4b5563; border-radius: 0.5rem; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.3s; }
        .drop-zone:hover { border-color: #60a5fa; background: #1f2937; }
        .drop-zone.dragover { border-color: #60a5fa; background: #1f2937; }
        .status-bar { padding: 0.75rem 1rem; border-radius: 0.5rem; margin-bottom: 1rem; display: none; font-weight: 500; }
        .status-bar.processing { background: #1e3a8a; color: #60a5fa; display: block; }
        .status-bar.success { background: #065f46; color: #6ee7b7; display: block; }
        .status-bar.error { background: #991b1b; color: #fca5a5; display: block; }
        input[type="text"], input[type="email"], input[type="tel"], input[type="file"] { background: #111827; border: 1px solid #374151; color: #f3f4f6; border-radius: 0.5rem; padding: 0.75rem 1rem; width: 100%; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2); }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 0.5rem; padding: 0.75rem 2rem; font-weight: 600; cursor: pointer; transition: transform 0.1s; }
        button:hover { transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .results-container { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <div class="gradient-bg text-white py-8 px-8 shadow-lg">
        <div class="container mx-auto max-w-6xl">
            <h1 class="text-4xl font-bold mb-2"><i class="fas fa-user-secret mr-3"></i>OmniTrace</h1>
            <p class="text-blue-100">Enter any identifier to trace digital footprints across the internet</p>
        </div>
    </div>

    <div class="container mx-auto p-8 max-w-6xl">
        <div class="card">
            <div class="section-title"><i class="fas fa-search"></i> Trace Target</div>
            <form id="traceForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Name</label>
                        <input type="text" id="name" placeholder="John Doe">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Email</label>
                        <input type="email" id="email" placeholder="john@example.com">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Phone</label>
                        <input type="tel" id="phone" placeholder="+1234567890">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Username</label>
                        <input type="text" id="username" placeholder="johndoe">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Upload Photo (Face or Place)</label>
                    <div class="drop-zone" id="dropZone">
                        <i class="fas fa-cloud-upload-alt text-4xl text-gray-500 mb-2"></i>
                        <p class="text-gray-400">Drag & drop an image here or click to browse</p>
                        <input type="file" id="photo" accept="image/*" class="hidden">
                        <p class="text-sm text-gray-500 mt-2" id="fileName"></p>
                    </div>
                </div>
                <button type="submit" id="searchBtn"><i class="fas fa-radar mr-2"></i>Start Trace</button>
            </form>
        </div>

        <div class="status-bar" id="statusBar"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="text-gray-400">Scanning databases, this may take a moment...</p>
        </div>

        <div class="results-container" id="results"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';
        let selectedFile = null;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('photo');
        const fileName = document.getElementById('fileName');
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                fileName.textContent = e.dataTransfer.files[0].name;
                selectedFile = e.dataTransfer.files[0];
            }
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                fileName.textContent = e.target.files[0].name;
                selectedFile = e.target.files[0];
            }
        });

        document.getElementById('traceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('searchBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const statusBar = document.getElementById('statusBar');

            btn.disabled = true;
            loading.style.display = 'block';
            results.style.display = 'none';
            statusBar.className = 'status-bar processing';
            statusBar.textContent = 'Processing... Sending trace request...';

            try {
                const formData = new FormData();
                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const username = document.getElementById('username').value.trim();
                if (name) formData.append('name', name);
                if (email) formData.append('email', email);
                if (phone) formData.append('phone', phone);
                if (username) formData.append('username', username);
                if (selectedFile) formData.append('photo', selectedFile);

                statusBar.textContent = 'Processing... Contacting API...';
                const resp = await fetch(`${API_URL}/trace`, { method: 'POST', body: formData });
                if (!resp.ok) throw new Error(`Server returned ${resp.status}`);
                const data = await resp.json();
                
                statusBar.className = 'status-bar success';
                statusBar.textContent = 'Success! Trace complete. Scroll down to see results.';
                renderResults(data);
                setTimeout(() => { statusBar.className = 'status-bar'; }, 5000);
            } catch (err) {
                statusBar.className = 'status-bar error';
                statusBar.textContent = 'Error: ' + err.message;
                console.error(err);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });

        function renderResults(data) {
            const container = document.getElementById('results');
            container.innerHTML = '';
            container.style.display = 'block';

            const target = data.target || {};
            const findings = data.findings || {};
            const graph = data.graph || {};
            const confidence = data.confidence || 0;

            let html = '<div class="grid grid-cols-4 gap-4 mb-8">';
            html += `<div class="stat-card"><div class="stat-value">${(target.name || 'N/A').split(' ')[0]}</div><div class="stat-label">Name</div></div>`;
            html += `<div class="stat-card"><div class="stat-value">${Object.keys(findings.social || {}).length}</div><div class="stat-label">Social Profiles</div></div>`;
            html += `<div class="stat-card"><div class="stat-value">${Object.values(findings.username_matches || {}).filter(v => v.found).length}</div><div class="stat-label">Platforms Found</div></div>`;
            html += `<div class="stat-card"><div class="stat-value">${Object.values(findings.breaches || {}).reduce((sum, v) => sum + (v.breaches_found || 0), 0)}</div><div class="stat-label">Breaches</div></div>`;
            html += '</div>';

            if (target.name || target.email || target.phone || target.username) {
                html += '<div class="card"><div class="section-title"><i class="fas fa-bullseye"></i> Target Information</div><div class="grid grid-cols-2 md:grid-cols-4 gap-4">';
                if (target.name) html += `<div class="bg-gray-800 p-3 rounded-lg"><div class="text-xs text-gray-400 mb-1">Name</div><div class="font-medium text-sm">${target.name}</div></div>`;
                if (target.email) html += `<div class="bg-gray-800 p-3 rounded-lg"><div class="text-xs text-gray-400 mb-1">Email</div><div class="font-medium text-sm text-blue-400">${target.email}</div></div>`;
                if (target.phone) html += `<div class="bg-gray-800 p-3 rounded-lg"><div class="text-xs text-gray-400 mb-1">Phone</div><div class="font-medium text-sm">${target.phone}</div></div>`;
                if (target.username) html += `<div class="bg-gray-800 p-3 rounded-lg"><div class="text-xs text-gray-400 mb-1">Username</div><div class="font-medium text-sm">${target.username}</div></div>`;
                html += '</div></div>';
            }

            if (findings.people_search && findings.people_search.results) {
                html += '<div class="card"><div class="section-title"><i class="fas fa-search"></i> People Search</div>';
                findings.people_search.results.forEach(r => {
                    html += `<div class="profile-row"><div><div class="font-medium">${r.source}</div><div class="text-sm text-gray-400">${r.occupation || ''} ${r.age || ''}</div></div><div class="text-right"><div class="text-sm">${(r.locations || []).join(', ')}</div><span class="badge badge-success">${r.confidence}</span></div></div>`;
                });
                html += '</div>';
            }

            if (findings.social) {
                const found = Object.entries(findings.social).filter(([_, v]) => v.found);
                if (found.length) {
                    html += `<div class="card"><div class="section-title"><i class="fas fa-share-alt"></i> Social Media Profiles</div><div class="text-sm text-gray-400 mb-4">${found.length} profiles found</div>`;
                    found.forEach(([platform, data]) => {
                        html += `<div class="profile-row"><div class="flex items-center gap-2"><span class="font-medium capitalize">${platform}</span><span class="badge badge-success">Found</span></div><a href="${data.url}" target="_blank" class="text-blue-400 text-sm">${data.url} <i class="fas fa-external-link-alt ml-1"></i></a></div>`;
                    });
                    html += '</div>';
                }
            }

            if (findings.email_info) {
                const ei = findings.email_info;
                html += `<div class="card"><div class="section-title"><i class="fas fa-envelope"></i> Email Intelligence</div>
                    <div class="bg-gray-800 p-3 rounded-lg mb-4"><div class="text-xs text-gray-400">Email Address</div><div class="font-medium text-blue-400">${ei.email}</div></div>
                    <div class="grid grid-cols-3 gap-4 mb-4">
                        <div class="bg-gray-800 p-3 rounded-lg text-center"><div class="text-xs text-gray-400 mb-1">Valid</div><div class="font-medium text-green-400">${ei.valid}</div></div>
                        <div class="bg-gray-800 p-3 rounded-lg text-center"><div class="text-xs text-gray-400 mb-1">Gravatar</div><div class="font-medium">${ei.gravatar?.found ? '<i class="fas fa-check text-green-400"></i> Yes' : '<i class="fas fa-times text-red-400"></i> No'}</div></div>
                        <div class="bg-gray-800 p-3 rounded-lg text-center"><div class="text-xs text-gray-400 mb-1">Breaches</div><div class="font-medium">${ei.breaches_checked ? 'Checked' : 'Not checked'}</div></div>
                    </div>
                    <div class="text-sm text-gray-400 mb-2">Linked Social Accounts:</div>
                    <ul class="list-disc list-inside space-y-1">${(ei.social_accounts || []).map(sa => `<li><a href="${sa.url}" class="text-blue-400" target="_blank">${sa.platform}</a> - <span class="text-gray-400">${sa.confidence}</span></li>`).join('') || '<li class="text-gray-500">None found</li>'}</ul>
                </div>`;
            }

            if (findings.phone_info) {
                const pi = findings.phone_info;
                const loc = pi.location || {};
                html += `<div class="card"><div class="section-title"><i class="fas fa-phone"></i> Phone Intelligence</div>
                    <div class="bg-gray-800 p-3 rounded-lg mb-4"><div class="text-xs text-gray-400">Phone Number</div><div class="font-medium text-blue-400">${pi.phone}</div></div>
                    <div class="grid grid-cols-3 gap-4 mb-4">
                        <div class="bg-gray-800 p-3 rounded-lg text-center"><div class="text-xs text-gray-400 mb-1">Carrier</div><div class="font-medium">${pi.carrier}</div></div>
                        <div class="bg-gray-800 p-3 rounded-lg text-center"><div class="text-xs text-gray-400 mb-1">Type</div><div class="font-medium capitalize">${pi.line_type}</div></div>
                        <div class="bg-gray-800 p-3 rounded-lg text-center"><div class="text-xs text-gray-400 mb-1">Location</div><div class="font-medium">${loc.city || 'unknown'}, ${loc.state || ''}</div></div>
                    </div>
                </div>`;
            }

            if (findings.breaches) {
                const rows = Object.entries(findings.breaches).filter(([_, v]) => v.breaches_found > 0).map(([key, info]) =>
                    `<div class="profile-row"><div><div class="font-medium capitalize">${key} Search</div><div class="text-sm text-red-400"><i class="fas fa-exclamation-triangle mr-1"></i>${info.breaches_found} breaches found</div></div><div class="text-right"><div class="text-sm text-gray-300">${info.sources.join(', ')}</div><span class="badge badge-danger mt-1 inline-block">confidence: ${info.confidence}</span></div></div>`
                ).join('');
                if (rows) {
                    html += `<div class="card"><div class="section-title"><i class="fas fa-shield-alt"></i> Breach Data</div>${rows}</div>`;
                }
            }

            if (findings.darkweb && findings.darkweb.total_matches > 0) {
                const rows = findings.darkweb.results.map(r => {
                    const risk = r.risk_level || 'unknown';
                    const cls = risk === 'high' ? 'badge-danger' : (risk === 'medium' ? 'badge-warning' : 'badge-info');
                    return `<div class="profile-row"><div><div class="font-medium">${r.site}</div><span class="badge ${cls}">${risk}</span></div><div class="text-right text-sm text-gray-400">${r.type} | confidence: ${r.confidence}</div></div>`;
                }).join('');
                html += `<div class="card"><div class="section-title"><i class="fas fa-user-secret"></i> Dark Web Mentions</div>${rows}</div>`;
            }

            if (graph.nodes && Object.keys(graph.nodes).length > 0) {
                html += `<div class="card"><div class="section-title"><i class="fas fa-project-diagram"></i> Relationship Graph</div>
                    <div class="graph-container"><div id="graph" style="height: 500px;"></div></div>
                    <script>
                        const graph = ${JSON.stringify(graph)};
                        const width = document.getElementById('graph').clientWidth || 800;
                        const height = 500;
                        const svg = d3.select('#graph').append('svg').attr('width', width).attr('height', height);
                        const nodeData = Object.entries(graph.nodes).map(([id, n]) => ({...n, id}));
                        const linkData = graph.edges.map(e => ({source: e.source, target: e.target, relationship: e.relationship}));
                        const simulation = d3.forceSimulation(nodeData).force('link', d3.forceLink(linkData).id(d => d.id).distance(120)).force('charge', d3.forceManyBody().strength(-400)).force('center', d3.forceCenter(width / 2, height / 2));
                        const link = svg.append('g').selectAll('line').data(linkData).enter().append('line').attr('stroke', '#4b5563').attr('stroke-width', 2);
                        const node = svg.append('g').selectAll('g').data(nodeData).enter().append('g');
                        node.append('circle').attr('r', 10).attr('fill', d => d.type === 'person' ? '#3b82f6' : (d.type === 'account' ? '#10b981' : '#f59e0b')).attr('stroke', '#1f2937').attr('stroke-width', 2);
                        node.append('text').text(d => d.label.substring(0, 15)).attr('x', 12).attr('y', 4).attr('fill', '#d1d5db').attr('font-size', '10px');
                        node.append('title').text(d => d.label);
                        simulation.on('tick', () => { link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y); node.attr('transform', d => `translate(${d.x},${d.y})`); });
                    <\/script>
                </div>`;
            }

            container.innerHTML = html;
            window.scrollTo({ top: container.offsetTop, behavior: 'smooth' });
        }
    </script>
</body>
</html>
